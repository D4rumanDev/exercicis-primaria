<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sinónimos y antónimos</title>
<link rel="stylesheet" href="../shared.css">
<style>
.base-word{font-size:2rem;font-weight:900;text-align:center;padding:14px 0;color:var(--a);letter-spacing:.04em;font-family:'Courier New',monospace}
.hint-rule{font-size:.78rem;font-weight:600;color:var(--m);text-align:center;margin-top:6px;min-height:1.2em}
.tag-syn{display:inline-block;background:#dcfce7;color:#166534;border:1px solid #86efac;border-radius:6px;padding:2px 10px;font-size:.78rem;font-weight:700;margin-bottom:4px}
.tag-ant{display:inline-block;background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;border-radius:6px;padding:2px 10px;font-size:.78rem;font-weight:700;margin-bottom:4px}
html[data-theme="dark"] .tag-syn{background:#14532d;color:#86efac;border-color:#166534}
html[data-theme="dark"] .tag-ant{background:#450a0a;color:#fca5a5;border-color:#991b1b}
</style>
</head>
<body>
<div class="page">

<div class="hdr">
  <div>
    <h1>Sinónimos y antónimos</h1>
    <div class="muted">Castellano · Vocabulario</div>
  </div>
</div>

<div id="gam-bar"></div>

<!-- 1: Sinónimos -->
<div class="card">
  <h2><span class="num">1</span> Elige el sinónimo</h2>
  <div class="card-sub">Un sinónimo tiene un significado igual o muy parecido.</div>
  <div style="text-align:center;margin-top:12px"><span class="tag-syn">≈ sinónimo</span></div>
  <div id="syn-word" class="base-word"></div>
  <div id="syn-opts" class="opts-row"></div>
  <div id="syn-hint" class="hint-rule"></div>
  <div id="syn-fb" class="fb mt2" style="text-align:center"></div>
  <div class="btn-row mt4">
    <button class="btn btn-outline btn-sm" onclick="nextSyn()">Siguiente →</button>
  </div>
</div>

<!-- 2: Antónimos -->
<div class="card">
  <h2><span class="num">2</span> Elige el antónimo</h2>
  <div class="card-sub">Un antónimo tiene el significado contrario.</div>
  <div style="text-align:center;margin-top:12px"><span class="tag-ant">↔ antónimo</span></div>
  <div id="ant-word" class="base-word"></div>
  <div id="ant-opts" class="opts-row"></div>
  <div id="ant-hint" class="hint-rule"></div>
  <div id="ant-fb" class="fb mt2" style="text-align:center"></div>
  <div class="btn-row mt4">
    <button class="btn btn-outline btn-sm" onclick="nextAnt()">Siguiente →</button>
  </div>
</div>

</div>
<div class="gam-toast" id="gam-toast"></div>
<script src="sinonimos_data.js"></script>
<script src="../shared.js"></script>
<script>
const EXER_KEY = 'ex_cast_syn_v1';

GAM_ACHS = [
  {id:'first', s:'⭐', n:'¡Primera respuesta!', d:'Tu primer acierto'},
  {id:'s3',    s:'🔥', n:'Racha x3',            d:'3 aciertos seguidos'},
  {id:'s5',    s:'⚡', n:'Racha x5',            d:'5 aciertos seguidos'},
  {id:'s10',   s:'💥', n:'Racha x10',           d:'10 aciertos seguidos'},
  {id:'syn20', s:'≈',  n:'Experto en sinónimos', d:'20 sinónimos correctos'},
  {id:'ant20', s:'↔',  n:'Experto en antónimos', d:'20 antónimos correctos'},
  {id:'ok50',  s:'🥉', n:'50 aciertos',          d:'50 respuestas correctas en total'},
  {id:'ok200', s:'🥈', n:'200 aciertos',         d:'200 respuestas correctas'},
  {id:'ok500', s:'🏆', n:'500 aciertos',         d:'500 respuestas correctas'},
];

function gExtraAchs(g, tryA) {
  const e = eLoad();
  tryA('syn20', (e.syn || 0) >= 20);
  tryA('ant20', (e.ant || 0) >= 20);
}

// ── Secció 1: Sinònims ──
let synPrev = -1;

function nextSyn() {
  let idx;
  do { idx = ri(0, SYN_POOL.length - 1); } while (idx === synPrev && SYN_POOL.length > 1);
  synPrev = idx;
  const e = SYN_POOL[idx];

  document.getElementById('syn-word').textContent = e.w;
  document.getElementById('syn-hint').textContent = '';
  const fbEl = document.getElementById('syn-fb');
  fbEl.textContent = '';
  fbEl.className   = 'fb mt2';

  const opts = sh([e.syn, e.syn_w[0], e.syn_w[1], e.syn_w[2]]);
  const onOk = () => {
    document.getElementById('syn-hint').textContent = '«' + e.w + '» ≈ «' + e.syn + '» · contrario: «' + e.ant + '»';
    setFb('syn-fb', true, pick(OK));
    gCorrect(8, 'syn');
  };
  const onKo = () => {
    document.getElementById('syn-hint').textContent = '«' + e.w + '» ≈ «' + e.syn + '» · contrario: «' + e.ant + '»';
    setFb('syn-fb', false, 'Era «' + e.syn + '»');
    gWrong();
  };
  renderOpts('syn-opts', opts, e.syn, onOk, onKo);
}

// ── Secció 2: Antònims ──
let antPrev = -1;

function nextAnt() {
  let idx;
  do { idx = ri(0, SYN_POOL.length - 1); } while (idx === antPrev && SYN_POOL.length > 1);
  antPrev = idx;
  const e = SYN_POOL[idx];

  document.getElementById('ant-word').textContent = e.w;
  document.getElementById('ant-hint').textContent = '';
  const fbEl = document.getElementById('ant-fb');
  fbEl.textContent = '';
  fbEl.className   = 'fb mt2';

  const opts = sh([e.ant, e.ant_w[0], e.ant_w[1], e.ant_w[2]]);
  const onOk = () => {
    document.getElementById('ant-hint').textContent = '«' + e.w + '» ↔ «' + e.ant + '» · sinónimo: «' + e.syn + '»';
    setFb('ant-fb', true, pick(OK));
    gCorrect(8, 'ant');
  };
  const onKo = () => {
    document.getElementById('ant-hint').textContent = '«' + e.w + '» ↔ «' + e.ant + '» · sinónimo: «' + e.syn + '»';
    setFb('ant-fb', false, 'Era «' + e.ant + '»');
    gWrong();
  };
  renderOpts('ant-opts', opts, e.ant, onOk, onKo);
}

// ── Init ──
gRender();
nextSyn();
nextAnt();
</script>
</body>
</html>
