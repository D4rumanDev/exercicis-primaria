<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Crossword Puzzle</title>
<link rel="stylesheet" href="../shared.css">
<style>
:root{--cw:36px}
.size-btns{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
.size-btn{padding:7px 18px;border-radius:8px;border:2px solid var(--b);cursor:pointer;font-weight:600;background:var(--s);color:var(--t);font-family:inherit;font-size:.85rem;transition:all .1s}
.size-btn.active{border-color:var(--a);background:var(--bg-hi2);color:var(--a)}
.cw-wrap{overflow-x:auto;padding:8px 0;text-align:center}
.cw-grid{display:inline-grid;gap:2px}
.cw-cell{width:var(--cw);height:var(--cw);position:relative;flex-shrink:0}
.cw-cell.black{background:#1e293b;border-radius:2px}
.cw-cell input{position:absolute;inset:0;width:100%;height:100%;text-align:center;font-size:1.05rem;font-weight:700;border:1px solid #cbd5e1;border-radius:2px;background:#fff;color:var(--t);text-transform:uppercase;padding:0;cursor:pointer;font-family:inherit;transition:background .15s}
.cw-cell input:focus{border-color:var(--a);background:var(--bg-hi);outline:none}
.cw-cell input.ok{background:var(--ok2)!important;color:var(--ok);border-color:var(--ok)}
.cw-cell input.ko{background:var(--er2)!important;color:var(--ko);border-color:var(--ko)}
.cn{position:absolute;top:1px;left:2px;font-size:.48rem;color:#94a3b8;pointer-events:none;z-index:1;line-height:1;font-weight:700}
.clues-wrap{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:4px}
.clues-ttl{font-size:.72rem;font-weight:700;color:var(--m);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.clue{font-size:.84rem;color:var(--t);margin-bottom:5px;line-height:1.4}
.clue b{color:var(--a);margin-right:3px}
@media(max-width:500px){:root{--cw:28px}.cw-cell input{font-size:.85rem}.clues-wrap{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="page">

<div class="hdr">
  <div>
    <h1>Crossword Puzzle</h1>
    <div class="muted">Find the missing words using the descriptions below</div>
  </div>
</div>

<div id="gam-bar"></div>

<div class="card">
  <h2><span class="num">⊞</span> New Game</h2>
  <div class="card-sub">Choose a size and generate a new puzzle automatically.</div>
  <div class="size-btns">
    <button class="size-btn active" data-d="S" onclick="setDiff('S')">Small · 5 words</button>
    <button class="size-btn" data-d="M" onclick="setDiff('M')">Medium · 8 words</button>
    <button class="size-btn" data-d="L" onclick="setDiff('L')">Large · 12 words</button>
  </div>
  <div class="btn-row mt4">
    <button class="btn btn-outline" onclick="newGame()">Generate ▶</button>
  </div>
</div>

<div class="card">
  <h2><span class="num">✎</span> Fill in the Crossword</h2>
  <div class="cw-wrap">
    <div id="cw-grid" class="cw-grid"></div>
  </div>
  <div id="cw-fb" class="fb mt2" style="text-align:center"></div>
  <div class="btn-row mt4">
    <button id="comprova-btn" class="btn btn-dark" onclick="checkAll()">Check ✓</button>
    <button class="btn btn-outline btn-sm" onclick="newGame()">Reset ↺</button>
    <button class="btn btn-outline btn-sm" onclick="revealAll()">Solution</button>
  </div>
</div>

<div class="card">
  <h2><span class="num">→↓</span> Clues</h2>
  <div class="clues-wrap">
    <div>
      <div class="clues-ttl">→ Across</div>
      <div id="clues-h"></div>
    </div>
    <div>
      <div class="clues-ttl">↓ Down</div>
      <div id="clues-v"></div>
    </div>
  </div>
</div>

</div>
<div class="gam-toast" id="gam-toast"></div>

<script src="../shared.js"></script>
<script>
const EXER_KEY = 'ex_ang_cword_v1';
let curDir = 'H';
let lastFocused = null;
function getCellAt(r,c){return document.querySelector(`#cw-grid .cw-cell[data-r="${r}"][data-c="${c}"] input`);}

GAM_ACHS = [
  ...GAM_ACHS,
  {id:'cw1',  s:'🔑', n:'First Crossword', d:'Complete your first crossword puzzle'},
  {id:'cw5',  s:'🧩', n:'5 Crosswords',     d:'Complete 5 crossword puzzles'},
  {id:'cw10', s:'🏆', n:'10 Crosswords',    d:'Complete 10 crossword puzzles'},
];
function gExtraAchs(g, tryA){
  const e = eLoad();
  tryA('cw1',  (e.cword||0) >= 1);
  tryA('cw5',  (e.cword||0) >= 5);
  tryA('cw10', (e.cword||0) >= 10);
}

// Vocabulary selected from Timetable, Town, Jobs and Activities (Level: 4th Grade)
const CWORD_POOL = [
  {w:'art',        c:"School subject where you draw and paint pictures"},
  {w:'music',      c:"School subject where you sing songs and play instruments"},
  {w:'drama',      c:"School subject where you act like an actor"},
  {w:'maths',      c:"School subject where you count numbers and do sums"},
  {w:'science',    c:"School subject where you learn about nature and plants"},
  {w:'history',    c:"School subject where you study things from the past"},
  {w:'geography',  c:"School subject where you study maps and different countries"},
  {w:'monday',     c:"The very first day of the school week"},
  {w:'tuesday',    c:"The day of the week after Monday"},
  {w:'wednesday',  c:"The middle day of the school week"},
  {w:'thursday',   c:"The day of the week before Friday"},
  {w:'friday',     c:"The last day of the school week"},
  {w:'week',       c:"A period of seven days from Monday to Sunday"},
  {w:'park',       c:"A green area in town where children play and run"},
  {w:'school',     c:"The big building where kids go to learn every morning"},
  {w:'bank',       c:"A place in town where people keep their money safe"},
  {w:'hospital',   c:"The place you go when you are sick or hurt"},
  {w:'museum',     c:"A building where you look at old objects or dinosaurs"},
  {w:'cafe',       c:"A small restaurant where you drink hot chocolate or eat cake"},
  {w:'home',       c:"The house or flat where you live with your family"},
  {w:'teacher',    c:"The person who teaches you new lessons at school"},
  {w:'student',    c:"A boy or a girl who goes to school to learn"},
  {w:'doctor',     c:"A professional person who fixes your body when it hurts"},
  {w:'nurse',      c:"A person who helps the doctor and looks after sick people"},
  {w:'chef',       c:"A professional cook who makes food in a restaurant"},
  {w:'football',   c:"A sport where two teams kick a ball into a big net"},
  {w:'basketball', c:"A sport where you bounce and throw a ball into a high hoop"},
  {w:'tennis',     c:"A sport where you hit a yellow ball with a racket"},
  {w:'swimming',   c:"An activity you do inside a pool filled with water"},
  {w:'running',    c:"Moving very fast on your feet for exercise"},
  {w:'cycling',    c:"An activity or sport where you ride a bicycle"},
  {w:'play',       c:"To have fun with games or sports with your friends"},
  {w:'read',       c:"To look at words in a book and understand them"},
  {w:'write',      c:"To use a pencil to make words on a piece of paper"},
  {w:'watch',      c:"To look at a film on the television or cinema screen"},
  {w:'speak',      c:"To use your mouth to say words and talk to someone"},
  {w:'like',       c:"To enjoy something or find it nice"},
  {w:'love',       c:"To like something or someone very, very much"},
  {w:'hate',       c:"To dislike something very much"}
];

const GSIZ = 19;
let currentGridCols = 0;

function doPlace(G, word, row, col, dir){
  const dr=dir==='V'?1:0, dc=dir==='H'?1:0;
  for(let i=0;i<word.length;i++) G[row+dr*i][col+dc*i]=word[i];
}

function canPlace(G, word, row, col, dir){
  const n=word.length, dr=dir==='V'?1:0, dc=dir==='H'?1:0;
  const eR=row+dr*(n-1), eC=col+dc*(n-1);
  if(row<0||col<0||eR>=GSIZ||eC>=GSIZ) return false;
  const pR=row-dr, pC=col-dc, nR=eR+dr, nC=eC+dc;
  if(pR>=0&&pC>=0&&G[pR][pC]!==null) return false;
  if(nR<GSIZ&&nC<GSIZ&&G[nR][nC]!==null) return false;
  let ints=0;
  for(let i=0;i<n;i++){
    const r=row+dr*i, c=col+dc*i, cell=G[r][c];
    if(cell!==null){
      if(cell!==word[i]) return false;
      ints++;
    } else {
      if(dir==='H'){
        if((r>0&&G[r-1][c]!==null)||(r<GSIZ-1&&G[r+1][c]!==null)) return false;
      } else {
        if((c>0&&G[r][c-1]!==null)||(c<GSIZ-1&&G[r][c+1]!==null)) return false;
      }
    }
  }
  return ints>0;
}

function getBounds(placed){
  let r0=GSIZ,r1=0,c0=GSIZ,c1=0;
  for(const p of placed){
    const eR=p.dir==='V'?p.row+p.w.length-1:p.row;
    const eC=p.dir==='H'?p.col+p.w.length-1:p.col;
    if(p.row<r0)r0=p.row; if(eR>r1)r1=eR;
    if(p.col<c0)c0=p.col; if(eC>c1)c1=eC;
  }
  return{r0,r1,c0,c1};
}

function tryGen(words){
  const G=Array.from({length:GSIZ},()=>Array(GSIZ).fill(null));
  const placed=[];
  const fw=words[0];
  const fr=Math.floor(GSIZ/2), fc=Math.floor((GSIZ-fw.w.length)/2);
  doPlace(G,fw.w,fr,fc,'H');
  placed.push({...fw,row:fr,col:fc,dir:'H'});

  for(let i=1;i<words.length;i++){
    const cw=words[i];
    const cands=[];
    for(const p of placed){
      for(let pi=0;pi<p.w.length;pi++){
        for(let wi=0;wi<cw.w.length;wi++){
          if(p.w[pi]!==cw.w[wi]) continue;
          const dir=p.dir==='H'?'V':'H';
          const row=p.dir==='H'?p.row-wi:p.row+pi;
          const col=p.dir==='H'?p.col+pi:p.col-wi;
          if(canPlace(G,cw.w,row,col,dir)) cands.push({row,col,dir});
        }
      }
    }
    if(cands.length){
      const best=cands[Math.floor(Math.random()*cands.length)];
      doPlace(G,cw.w,best.row,best.col,best.dir);
      placed.push({...cw,...best});
    }
  }

  if(placed.length<3) return null;
  const{r0,r1,c0,c1}=getBounds(placed);
  const rows=r1-r0+1, cols=c1-c0+1;

  const nums=Array.from({length:rows},()=>Array(cols).fill(0));
  let n=1;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const gr=r0+r, gc=c0+c;
      if(G[gr][gc]===null) continue;
      const sA=(gc===0||G[gr][gc-1]===null)&&gc+1<GSIZ&&G[gr][gc+1]!==null;
      const sD=(gr===0||G[gr-1][gc]===null)&&gr+1<GSIZ&&G[gr+1][gc]!==null;
      if(sA||sD) nums[r][c]=n++;
    }
  }
  for(const p of placed) p.num=nums[p.row-r0][p.col-c0];

  return{G,placed,r0,c0,rows,cols,nums};
}

let diff='S';

function setDiff(d){
  diff=d;
  document.querySelectorAll('.size-btn').forEach(b=>b.classList.toggle('active',b.dataset.d===d));
}

function newGame(){
  const cnt={S:5,M:8,L:12}[diff];
  let pool=[...CWORD_POOL];
  if(diff==='S') pool.sort((a,b)=>a.w.length-b.w.length);
  else if(diff==='L') pool.sort((a,b)=>b.w.length-a.w.length);
  const subset=pool.slice(0,Math.min(pool.length,cnt+8));

  curDir='H'; lastFocused=null;
  let res=null;
  for(let att=0;att<15;att++){
    const shuffled=sh([...subset]);
    res=tryGen(shuffled.slice(0,cnt+4));
    if(res&&res.placed.length>=3) break;
  }

  document.getElementById('cw-fb').textContent='';
  document.getElementById('cw-fb').className='fb mt2';
  document.getElementById('clues-h').textContent='';
  document.getElementById('clues-v').textContent='';
  document.getElementById('comprova-btn').style.display='';

  if(!res){
    const p=document.createElement('p');
    p.className='muted'; p.style.padding='16px 0';
    p.textContent="Could not generate layout. Please try again.";
    const g=document.getElementById('cw-grid');
    g.textContent=''; g.appendChild(p);
    return;
  }
  renderCW(res);
}

function renderCW(res){
  const {G,placed,r0,c0,rows,cols,nums} = res;
  currentGridCols = cols;
  const el=document.getElementById('cw-grid');
  el.style.gridTemplateColumns=`repeat(${cols},var(--cw))`;
  el.innerHTML='';

  for(let r=0; r<rows; r++){
    for(let c=0; c<cols; c++){
      const gr=r0+r, gc=c0+c;
      const div=document.createElement('div');
      if(G[gr][gc]){
        div.className='cw-cell';
        div.dataset.r = r;
        div.dataset.c = c;
        if(nums[r][c]){
          const sp=document.createElement('span');
          sp.className='cn';
          sp.textContent=nums[r][c];
          div.appendChild(sp);
        }
        const inp=document.createElement('input');
        inp.type='text'; inp.maxLength=1;
        inp.dataset.ans=G[gr][gc].toUpperCase();
        inp.setAttribute('autocomplete','off');
        inp.addEventListener('input',onInp);
        inp.addEventListener('keydown',onKd);
        inp.addEventListener('click',onCellClick);
        div.appendChild(inp);
      } else {
        div.className='cw-cell black';
      }
      el.appendChild(div);
    }
  }

  const hW=placed.filter(p=>p.dir==='H').sort((a,b)=>a.num-b.num);
  const vW=placed.filter(p=>p.dir==='V').sort((a,b)=>a.num-b.num);
  renderClueList('clues-h', hW);
  renderClueList('clues-v', vW);
}

function renderClueList(id, words){
  const el=document.getElementById(id);
  el.textContent='';
  words.forEach(p=>{
    const d=document.createElement('div'); d.className='clue';
    const b=document.createElement('b');   b.textContent=p.num+'.';
    d.appendChild(b);
    d.appendChild(document.createTextNode(p.c));
    el.appendChild(d);
  });
}

function allInps(){ return[...document.querySelectorAll('#cw-grid input')]; }

function onCellClick(e){
  const inp=e.target;
  if(lastFocused===inp){
    const cell=inp.parentElement;
    const r=parseInt(cell.dataset.r), c=parseInt(cell.dataset.c);
    const canH=!!(getCellAt(r,c+1)||getCellAt(r,c-1));
    const canV=!!(getCellAt(r+1,c)||getCellAt(r-1,c));
    if(curDir==='H'&&canV) curDir='V';
    else if(curDir==='V'&&canH) curDir='H';
  }
  lastFocused=inp;
}

function onInp(e){
  const inp=e.target;
  inp.value=inp.value.toUpperCase().replace(/[^A-Z]/g,'').slice(-1);
  inp.classList.remove('ok','ko');
  if(inp.value){
    const cell=inp.parentElement;
    const r=parseInt(cell.dataset.r), c=parseInt(cell.dataset.c);
    const next=curDir==='H'?getCellAt(r,c+1):getCellAt(r+1,c);
    if(next) next.focus();
  }
}

function onKd(e){
  const inp=e.target;
  const cell=inp.parentElement;
  const r=parseInt(cell.dataset.r), c=parseInt(cell.dataset.c);

  if(e.key==='Backspace'&&!inp.value){
    const prev=curDir==='H'?getCellAt(r,c-1):getCellAt(r-1,c);
    if(prev){prev.focus();prev.value='';prev.classList.remove('ok','ko');}
    e.preventDefault();
  }
  if(e.key==='ArrowRight'){const t=getCellAt(r,c+1);if(t){curDir='H';t.focus();e.preventDefault();}}
  if(e.key==='ArrowLeft') {const t=getCellAt(r,c-1);if(t){curDir='H';t.focus();e.preventDefault();}}
  if(e.key==='ArrowDown') {const t=getCellAt(r+1,c);if(t){curDir='V';t.focus();e.preventDefault();}}
  if(e.key==='ArrowUp')   {const t=getCellAt(r-1,c);if(t){curDir='V';t.focus();e.preventDefault();}}
}

function checkAll(){
  let ok=0, tot=0;
  allInps().forEach(inp=>{
    tot++;
    const correct=inp.dataset.ans;
    inp.classList.toggle('ok', inp.value===correct);
    inp.classList.toggle('ko', inp.value!==correct);
    if(inp.value===correct) ok++;
  });
  const fb=document.getElementById('cw-fb');
  if(ok===tot&&tot>0){
    fb.textContent='✓ Brilliant! All words are correct!';
    fb.className='fb ok mt2';
    document.getElementById('comprova-btn').style.display='none';
    gCorrect(20,'cword');
  } else {
    fb.textContent=`${ok} out of ${tot} letters correct. Keep trying!`;
    fb.className='fb ko mt2';
  }
}

function revealAll(){
  allInps().forEach(inp=>{inp.value=inp.dataset.ans;inp.classList.add('ok');inp.classList.remove('ko');});
  document.getElementById('cw-fb').textContent='Solution shown.';
  document.getElementById('cw-fb').className='fb mt2';
}

// Init
gRender();
newGame();
</script>
</body>
</html>
