<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title><!-- TÍTOL EXERCICI --></title>
<!-- !! Copiar a mates/, llengua/ o angles/ — els fitxers ../shared.css i ../shared.js han d'estar al directori pare -->
<link rel="stylesheet" href="../shared.css">
<style>
/* ── CSS ESPECÍFIC D'AQUEST EXERCICI ── */
/* Afegir aquí les classes pròpies de l'exercici */

/* Botons d'opció genèrics — ja inclosos a shared.css, copiar aquí si cal adaptar */
/* .aopt{ ... } */
/* .opts-row{ ... } */

/* Input numèric genèric */
.geo-inp{width:80px;padding:8px;border:2px solid var(--b);border-radius:8px;font-size:1.3rem;font-weight:800;text-align:center;outline:none;font-family:inherit}
.geo-inp:focus{border-color:var(--a)}
.geo-inp.ok{border-color:var(--ok);background:#f0fdf4;color:var(--ok)}
.geo-inp.ko{border-color:var(--ko);background:#fef2f2;color:var(--ko)}
.inp-row{display:flex;align-items:center;gap:8px;justify-content:center;margin:10px 0}
.inp-unit{font-size:1.1rem;font-weight:700;color:var(--m)}

</style>
</head>
<body>
<div class="page">

<div class="hdr">
  <div>
    <h1><!-- TÍTOL --></h1>
    <div class="muted"><!-- Subtítol: Tema1 · Tema2 · Tema3 --></div>
  </div>
</div>

<div id="gam-bar"></div>


<!-- ═══════════════════════════════════════════════════════
     SECCIÓ 1: NOM DE LA SECCIÓ
     ═══════════════════════════════════════════════════════ -->
<div class="card">
  <h2><span class="num">1</span> Títol de la secció</h2>
  <div class="card-sub">Descripció breu de la tasca per a l'alumne.</div>

  <div id="sec1-vis"></div>
  <div id="sec1-opts" class="opts-row"></div>
  <div id="sec1-fb" class="fb"></div>

  <div class="btn-row mt4">
    <button class="btn btn-outline btn-sm" onclick="nextSec1()">Següent →</button>
  </div>
</div>


<!-- ═══════════════════════════════════════════════════════
     SECCIÓ N: PROBLEMES (sempre última)
     ═══════════════════════════════════════════════════════ -->
<div class="card">
  <h2><span class="num"><!-- N --></span> Problemes</h2>
  <div id="prob-list"></div>
  <div class="btn-row mt4">
    <button class="btn btn-outline btn-sm" onclick="nextProblemes()">Nous problemes →</button>
  </div>
</div>

</div><!-- /page -->

<script src="../shared.js"></script>
<script>
// ════════════════════════════════════════════════════════════
// CONFIGURACIÓ — adaptar per a cada exercici
// ════════════════════════════════════════════════════════════

// Clau pròpia d'aquest exercici (convenció: 'ex_<tema>_v1')
const EXER_KEY = 'ex_TEMA_v1';

// Nivells XP — sobrescriu GAM_LVS si vols noms temàtics
GAM_LVS = [
  {n:'Principiant', x:0},
  {n:'Aprenent',    x:75},
  {n:'Estudiant',   x:200},
  {n:'Expert',      x:450},
  {n:'Mestre',      x:900}
];

// Assoliments — ids 'first','s3','s5','s10' obligatoris (no eliminar)
GAM_ACHS = [
  {id:'first', s:'🌟', n:'Primer Encert',  d:'Primera resposta correcta'},
  {id:'s3',    s:'🔥', n:'Ratxa x3',       d:'3 encerts seguits'},
  {id:'s5',    s:'⚡', n:'Ratxa x5',       d:'5 encerts seguits'},
  {id:'s10',   s:'💥', n:'Ratxa x10',      d:'10 encerts seguits'},
  // {id:'tema-1', s:'🎯', n:'Nom',  d:'Descripció'},
  {id:'ok50',  s:'🥉', n:'50 Encerts',     d:'50 respostes correctes'},
  {id:'ok200', s:'🥈', n:'200 Encerts',    d:'200 respostes correctes'}
];

// ════════════════════════════════════════════════════════════
// LÒGICA DE L'EXERCICI
// Funcions disponibles de shared.js:
//   ri(a,b)                          → enter aleatori [a,b]
//   pick(arr)                        → element aleatori d'un array
//   sh(arr)                          → còpia barrejada d'un array
//   setFb(id, ok, text)              → mostra feedback en element .fb
//   clrInp(id)                       → neteja input i treu classes ok/ko
//   checkInp(inputId, correct, fbId, xp) → comprova input, aplica feedback i XP
//   renderOpts(cId, opts, correct, onOk, onKo) → botons .aopt amb lògica ok/ko/show
//   renderProbs(pool, cId, n, xp)    → N preguntes MCQ des d'un pool estàtic
//   gCorrect(xp, type?) / gWrong()  → actualitza gamificació
//   OK[] / KO[]                      → frases de feedback aleatoris
// ════════════════════════════════════════════════════════════

// ── SECCIÓ 1 ──
function nextSec1(){
  const correct = 'Resposta correcta';
  const opts = sh([correct, 'Opció A', 'Opció B', 'Opció C']);
  setFb('sec1-fb', true, '');
  renderOpts('sec1-opts', opts, correct,
    () => { setFb('sec1-fb', true,  pick(OK)); gCorrect(5, 'sec1'); },
    () => { setFb('sec1-fb', false, pick(KO)); gWrong(); }
  );
}

// ── PROBLEMES ──
const PROB_POOL = [
  // Format: { text: 'HTML...', opts: ['A','B','C'], ans: 'A' }
  {
    text: `La <strong>Sara</strong> té <strong>12</strong> cromos i en regala <strong>1/3</strong>. Quants cromos regala?`,
    opts: ['4 cromos', '3 cromos', '6 cromos'],
    ans:  '4 cromos'
  },
];

function nextProblemes(){
  renderProbs(PROB_POOL, 'prob-list', 3, 5);
}

// ════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════
gRender();
nextSec1();
nextProblemes();
</script>
</body>
</html>
