<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Estadístiques</title>
<link rel="stylesheet" href="shared.css">
<style>
:root{
  --cl-mates:#1d4ed8;--cl-llengua:#059669;--cl-angles:#7c3aed;--cl-castella:#d97706;
  --bar-ok:#16a34a;--bar-ko:#ef4444
}
@media(prefers-color-scheme:dark){:root{
  --cl-mates:#60a5fa;--cl-llengua:#34d399;--cl-angles:#a78bfa;--cl-castella:#f59e0b;
  --bar-ok:#4ade80;--bar-ko:#f87171
}}
html[data-theme="dark"]{
  --cl-mates:#60a5fa;--cl-llengua:#34d399;--cl-angles:#a78bfa;--cl-castella:#f59e0b;
  --bar-ok:#4ade80;--bar-ko:#f87171
}
html[data-theme="light"]{
  --cl-mates:#1d4ed8;--cl-llengua:#059669;--cl-angles:#7c3aed;--cl-castella:#d97706;
  --bar-ok:#16a34a;--bar-ko:#ef4444
}

/* ── Summary ── */
.sum-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--sp-sm)}
.sum-cell{background:var(--bg-hi);border-radius:var(--r);padding:var(--sp-md) var(--sp-sm);text-align:center}
.sum-n{font-size:var(--fxl);font-weight:800;color:var(--a);line-height:1.1}
.sum-lbl{font-size:var(--fxs);color:var(--m);margin-top:4px}

/* ── 30-day chart ── */
.chart-wrap{overflow-x:auto;padding-bottom:2px;margin-top:var(--sp-md)}
.chart{display:flex;align-items:stretch;gap:3px;height:110px;min-width:min-content}
.bar-col{display:flex;flex-direction:column;align-items:center;flex:1;min-width:14px;max-width:28px;cursor:default}
.bar-sp{flex:1;min-height:0}
.bar-wrap{width:100%;border-radius:3px 3px 0 0;overflow:hidden;display:flex;flex-direction:column;opacity:.8;transition:opacity .1s}
.bar-col:hover .bar-wrap{opacity:1}
.bar-wrap.today{opacity:1;outline:2px solid var(--a);outline-offset:1px}
.bar-ok-seg{width:100%;background:var(--bar-ok)}
.bar-ko-seg{width:100%;background:var(--bar-ko)}
.bar-zero{width:100%;height:2px;background:var(--b);opacity:.6;border-radius:2px}
.bar-lbl{font-size:.48rem;color:var(--m);text-align:center;line-height:1;height:14px;display:flex;align-items:center;justify-content:center;white-space:nowrap}
.legend{display:flex;gap:var(--sp-md);font-size:var(--fxs);color:var(--m);margin-top:var(--sp-sm);align-items:center}
.leg-dot{width:9px;height:9px;border-radius:2px;display:inline-block;flex-shrink:0}
.leg-ok{background:var(--bar-ok)}
.leg-ko{background:var(--bar-ko)}

/* ── Per-subject cards ── */
.subj-card{border-radius:var(--r);overflow:hidden;border:1px solid var(--b);background:var(--s);margin-bottom:var(--sp-sm);box-shadow:0 1px 4px rgba(0,0,0,.05)}
.subj-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;font-size:.84rem;font-weight:800;cursor:pointer;user-select:none;gap:8px;background:none;border:none;width:100%;text-align:left;font-family:inherit;border-bottom:1px solid var(--b)}
.subj-hdr:hover{opacity:.85}
.subj-hdr-left{display:flex;align-items:center;gap:8px}
.subj-total{font-size:.72rem;font-weight:700;padding:2px 8px;border-radius:100px;background:rgba(0,0,0,.06)}
.subj-chevron{font-size:.55rem;opacity:.4;transition:transform .18s;flex-shrink:0;display:inline-block}
.subj-card.collapsed .subj-chevron{transform:rotate(-90deg)}
.subj-card.collapsed .subj-body{display:none}
.subj-body{padding:4px 0 6px}

/* ── Exercise rows ── */
.ex-row{display:flex;align-items:center;gap:8px;padding:5px 14px;transition:background .1s}
.ex-row:hover{background:var(--bg)}
.ex-row.zero{opacity:.35}
.ex-icon{font-size:.85rem;min-width:18px;text-align:center;flex-shrink:0;line-height:1}
.ex-name{font-size:var(--fs);color:var(--t);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
.ex-bar-wrap{width:64px;height:5px;background:var(--b);border-radius:3px;overflow:hidden;flex-shrink:0}
.ex-bar-fill{height:100%;border-radius:3px;transition:width .5s .1s}
.ex-count{font-size:.8rem;font-weight:700;min-width:26px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums}
</style>
</head>
<body>
<div class="page">
  <div class="hdr">
    <div><h1>📊 Estadístiques</h1><div class="muted">Progrés complet</div></div>
  </div>
  <div id="gam-bar"></div>
  <div class="card">
    <div class="sum-grid" id="summary"></div>
  </div>
  <div class="card">
    <div style="font-weight:700;color:var(--t);font-size:var(--fm)">Últims 30 dies</div>
    <div class="chart-wrap"><div class="chart" id="chart"></div></div>
    <div class="legend">
      <span class="leg-dot leg-ok"></span>Encerts
      <span class="leg-dot leg-ko" style="margin-left:var(--sp-sm)"></span>Errors
    </div>
  </div>
  <div id="by-subject"></div>
</div>
<script src="shared.js"></script>
<script>
const SUBJECTS=[
  {id:'mates',label:'🧮 Matemàtiques',color:'var(--cl-mates)',ex:[
    {k:'suma_portant_v1',n:'Suma amb portant',i:'➕'},
    {k:'resta_portant_v1',n:'Resta amb portant',i:'➖'},
    {k:'ex_mult_v1',n:'Multiplicació',i:'✖️'},
    {k:'ex_taules_v1',n:'Taules de Multiplicar',i:'📋'},
    {k:'ex_div_v1',n:'Divisió',i:'➗'},
    {k:'ex_prob_v1',n:'Problemes',i:'🧮'},
    {k:'ex_vp_v1',n:'Valor posicional',i:'🔢'},
    {k:'ex_frac_v1',n:'Fraccions',i:'🍕'},
    {k:'ex_din_v1',n:'Diners',i:'💶'},
    {k:'ex_hores_v1',n:'Hores i Temps',i:'⏰'},
    {k:'ex_long_v1',n:'Mesures de Longitud',i:'📏'},
    {k:'mesures_cap_v1',n:'Mesures de Capacitat',i:'💧'},
    {k:'ex_geo_v1',n:'Geometria',i:'📐'},
    {k:'ex_est_v1',n:'Estadística i Sèries',i:'📈'},
  ]},
  {id:'llengua',label:'📚 Llengua',color:'var(--cl-llengua)',ex:[
    {k:'ex_cl_v1',n:'Comprensió Lectora',i:'📖'},
    {k:'ex_cat_morf_v1',n:'Morfologia i Ortografia',i:'✏️'},
    {k:'ex_cat_cword_v1',n:'Mots Encreuats',i:'🔤'},
    {k:'ex_cart_v1',n:'Cartells amb Faltes',i:'🔍'},
    {k:'ex_cat_wsearch_v1',n:'Sopa de Lletres',i:'🔠'},
  ]},
  {id:'angles',label:'🌍 Anglès',color:'var(--cl-angles)',ex:[
    {k:'ex_ang_hor_v1',n:'Timetable & Time',i:'🕐'},
    {k:'ex_ang_prof_v1',n:'Jobs & Professions',i:'👔'},
    {k:'ex_ang_act_v1',n:'Hobbies & Likes',i:'🎨'},
    {k:'ex_ang_city_v1',n:'Town & Places',i:'🏙️'},
    {k:'ex_ang_desc_v1',n:'Physical Description',i:'👤'},
    {k:'ex_ang_wsearch_v1',n:'Word Search',i:'🔎'},
    {k:'ex_ang_cword_v1',n:'Crossword Puzzle',i:'🔤'},
  ]},
  {id:'castella',label:'📝 Castellano',color:'var(--cl-castella)',ex:[
    {k:'ex_cast_byv_v1',n:'Ortografía: B y V',i:'✏️'},
    {k:'ex_cast_jg_v1',n:'Ortografía: J y G',i:'✏️'},
    {k:'ex_cast_lly_v1',n:'Ortografía: LL e Y',i:'✏️'},
    {k:'ex_cast_rr_v1',n:'Ortografía: R y RR',i:'✏️'},
    {k:'ex_cast_voc_v1',n:'Vocabulario',i:'📖'},
    {k:'ex_cast_fam_v1',n:'Familias de palabras',i:'🌳'},
    {k:'ex_cast_syn_v1',n:'Sinónimos y antónimos',i:'↔'},
    {k:'ex_cast_sig_v1',n:'Signos de puntuación',i:'.'},
    {k:'ex_cast_comp_v1',n:'Comprensión lectora',i:'📚'},
    {k:'ex_cast_ws_v1',n:'Sopa de letras',i:'🔍'},
    {k:'ex_cast_cw_v1',n:'Crucigrama',i:'🔤'},
  ]},
];

function eOk(key){try{const d=JSON.parse(localStorage.getItem(key));return d&&d.ok?d.ok:0;}catch{return 0;}}

function render(){
  const today=new Date().toISOString().slice(0,10);
  const hist=JSON.parse(localStorage.getItem('ex_hist_v1')||'[]');
  const gam=JSON.parse(localStorage.getItem('ex_gam_v1')||'{}');

  const byDay={};
  hist.forEach(h=>{byDay[h.d]=h;});
  if(gam.today===today)byDay[today]={d:today,ok:gam.todayOk||0,ko:gam.todayKo||0};

  // Summary
  const wd=new Date();wd.setDate(wd.getDate()-((wd.getDay()+6)%7));
  const ws=wd.toISOString().slice(0,10);
  const mon=today.slice(0,7);
  let wOk=0,mOk=0,best=0;
  Object.values(byDay).forEach(h=>{
    if(h.d>=ws)wOk+=h.ok;
    if(h.d.startsWith(mon))mOk+=h.ok;
    if(h.ok>best)best=h.ok;
  });
  const todayOk=byDay[today]?.ok||0;

  document.getElementById('summary').innerHTML=
    `<div class="sum-cell"><div class="sum-n">${todayOk}</div><div class="sum-lbl">📅 Avui</div></div>`+
    `<div class="sum-cell"><div class="sum-n">${wOk}</div><div class="sum-lbl">📆 Setmana</div></div>`+
    `<div class="sum-cell"><div class="sum-n">${mOk}</div><div class="sum-lbl">🗓 Mes</div></div>`+
    `<div class="sum-cell"><div class="sum-n">${best}</div><div class="sum-lbl">🏆 Millor dia</div></div>`;

  // 30-day chart
  const days=[];
  for(let i=29;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days.push(d.toISOString().slice(0,10));}
  const maxTotal=Math.max(1,...days.map(d=>(byDay[d]?.ok||0)+(byDay[d]?.ko||0)));
  const H=90;
  const MONS=['gen','feb','mar','abr','mai','jun','jul','ago','set','oct','nov','des'];
  document.getElementById('chart').innerHTML=days.map(d=>{
    const e=byDay[d]||{ok:0,ko:0};
    const total=e.ok+e.ko;
    const dt=new Date(d+'T12:00:00');
    const dn=dt.getDate(),mn=MONS[dt.getMonth()];
    const lbl=dn===1?`${dn}<br>${mn}`:`${dn}`;
    const tip=`${d}: ${e.ok} encerts · ${e.ko} errors`;
    if(total===0)return `<div class="bar-col" title="${tip}"><div class="bar-sp"></div><div class="bar-zero"></div><div class="bar-lbl">${lbl}</div></div>`;
    const totalH=Math.max(5,Math.round(total/maxTotal*H));
    const okH=Math.round(e.ok/total*totalH);
    const koH=totalH-okH;
    return `<div class="bar-col" title="${tip}">
      <div class="bar-sp"></div>
      <div class="bar-wrap${d===today?' today':''}">
        ${koH>0?`<div class="bar-ko-seg" style="height:${koH}px"></div>`:''}
        ${okH>0?`<div class="bar-ok-seg" style="height:${okH}px"></div>`:''}
      </div>
      <div class="bar-lbl">${lbl}</div>
    </div>`;
  }).join('');

  // Per-subject breakdown
  const saved=JSON.parse(localStorage.getItem('ex_stats_col')||'{}');
  document.getElementById('by-subject').innerHTML=SUBJECTS.map(s=>{
    const counts=s.ex.map(e=>eOk(e.k));
    const total=counts.reduce((a,b)=>a+b,0);
    const maxC=Math.max(1,...counts);
    const isCol=saved[s.id]??false;

    const rows=s.ex.map((e,i)=>{
      const c=counts[i];
      const pct=Math.round(c/maxC*100);
      return `<div class="ex-row${c===0?' zero':''}">
        <span class="ex-icon">${e.i}</span>
        <span class="ex-name">${e.n}</span>
        <div class="ex-bar-wrap"><div class="ex-bar-fill" style="width:${c?pct:0}%;background:${s.color}"></div></div>
        <span class="ex-count" style="color:${c?s.color:'var(--m)'}">${c||'—'}</span>
      </div>`;
    }).join('');

    return `<div class="subj-card${isCol?' collapsed':''}" data-subj="${s.id}">
      <button class="subj-hdr" style="color:${s.color}" onclick="toggleSubj(this)">
        <span class="subj-hdr-left">${s.label}</span>
        <span style="display:flex;align-items:center;gap:6px">
          <span class="subj-total" style="color:${s.color};background:color-mix(in srgb,${s.color} 12%,transparent)">${total} ✅</span>
          <span class="subj-chevron">▾</span>
        </span>
      </button>
      <div class="subj-body">${rows}</div>
    </div>`;
  }).join('');
}

function toggleSubj(btn){
  const card=btn.closest('.subj-card');
  card.classList.toggle('collapsed');
  const saved=JSON.parse(localStorage.getItem('ex_stats_col')||'{}');
  saved[card.dataset.subj]=card.classList.contains('collapsed');
  localStorage.setItem('ex_stats_col',JSON.stringify(saved));
}

render();
gRender();
</script>
</body>
</html>
